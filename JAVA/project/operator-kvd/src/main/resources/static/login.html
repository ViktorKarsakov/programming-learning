<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - КВД</title>
    <link rel="stylesheet" href="css/styles.css">

    <!--
        Стили прямо здесь, а не в styles.css, потому что:
        1) Эта страница стилистически отличается от остальных (нет сайдбара, центрирование)
        2) Эти стили нигде больше не используются
        3) styles.css подключён для базовых стилей (кнопки, input, шрифт)
    -->
    <style>
        /* Центрируем форму по середине экрана */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
        }

        /* Карточка формы входа */
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        /* Логотип / Заголовок */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 4px 0;
        }

        .login-subtitle {
            font-size: 13px;
            color: #6b7280;
            margin: 0;
        }

        /* Поля формы */
        .login-form .form-group {
            margin-bottom: 20px;
        }

        /* Сообщения об ошибке / успехе */
        .login-message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .login-message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .login-message.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        /* Кнопка входа — на всю ширину */
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!--
    Структура страницы входа:
    ─────────────────────────
    НЕТ сайдбара — это единственная страница без него.
    Пользователь ещё не авторизован → показываем только форму.

    После успешного входа Spring Security перенаправит на patient-form.html,
    где уже есть полный интерфейс с сайдбаром.
-->

<div class="login-wrapper">
    <div class="login-card">

        <!-- Шапка: иконка + название системы -->
        <div class="login-header">
            <div class="login-logo">🏥</div>
            <h1 class="login-title">КВД</h1>
            <p class="login-subtitle">Информационная система</p>
        </div>

        <!--
            Сообщение об ошибке.

            Spring Security при неудачном входе перенаправляет на /login.html?error
            JavaScript ниже проверяет URL и показывает это сообщение.

            При выходе из системы: /login.html?logout → "Вы вышли из системы"
        -->
        <div class="login-message error" id="errorMessage" style="display: none;">
            Неверный логин или пароль
        </div>
        <div class="login-message success" id="logoutMessage" style="display: none;">
            Вы вышли из системы
        </div>

        <!--
            Форма входа.

            action="/login" method="POST" — отправляет данные на URL,
            который обрабатывает Spring Security (настроен в SecurityConfig.loginProcessingUrl).

            Spring Security ожидает два поля: "username" и "password"
            (настроены в SecurityConfig.usernameParameter / passwordParameter).

            После отправки Spring Security:
            1) Вызовет CustomUserDetailsService.loadUserByUsername(username)
            2) Сравнит пароль через BCryptPasswordEncoder
            3) При успехе → создаст сессию → редирект на patient-form.html
            4) При ошибке → редирект на /login.html?error
        -->
        <form class="login-form" action="/login" method="POST">

            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" id="username"
                       placeholder="Введите логин" required autofocus>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" id="password"
                       placeholder="Введите пароль" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Войти
            </button>
        </form>

    </div>
</div>

<script>
    /**
     * При загрузке страницы проверяем URL-параметры,
     * которые Spring Security добавляет при редиректе.
     *
     * /login.html?error  → показываем "Неверный логин или пароль"
     * /login.html?logout → показываем "Вы вышли из системы"
     */
    const params = new URLSearchParams(window.location.search);

    if (params.has('error')) {
        document.getElementById('errorMessage').style.display = '';
    }

    if (params.has('logout')) {
        document.getElementById('logoutMessage').style.display = '';
    }

    /**
     * CSRF-токен для формы логина.
     *
     * Spring Security требует CSRF-токен при каждом POST-запросе.
     * Наша форма — обычный HTML (не Thymeleaf), поэтому сервер
     * не может вставить токен в скрытое поле автоматически.
     *
     * Решение: читаем CSRF-токен из cookie (которую Spring Security
     * установил при GET-запросе на login.html) и добавляем его
     * как скрытое поле _csrf перед отправкой формы.
     */
    function getCsrfFromCookie() {
        const cookies = document.cookie.split(';');
        for (const cookie of cookies) {
            const [name, value] = cookie.trim().split('=');
            if (name === 'XSRF-TOKEN') {
                return decodeURIComponent(value);
            }
        }
        return null;
    }

    // Перехватываем отправку формы и добавляем CSRF-токен
    document.querySelector('.login-form').addEventListener('submit', function() {
        const csrfToken = getCsrfFromCookie();
        if (csrfToken) {
            // Ищем уже существующее скрытое поле _csrf
            let input = this.querySelector('input[name="_csrf"]');
            if (!input) {
                // Создаём скрытое поле: <input type="hidden" name="_csrf" value="...">
                input = document.createElement('input');
                input.type = 'hidden';
                input.name = '_csrf';
                this.appendChild(input);
            }
            input.value = csrfToken;
        }
    });
</script>

</body>
</html>
